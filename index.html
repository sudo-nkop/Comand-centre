<!DOCTYPE html>
<html lang="en" data-theme="ai" data-mode="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d1a" />
  <title>Command Centre</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    try {
      var _d = JSON.parse(localStorage.getItem('command-centre-data') || '{}');
      var _s = (_d.settings && _d.settings.style) || 'ai';
      var _m = (_d.settings && _d.settings.mode)  || 'dark';
      document.documentElement.setAttribute('data-theme', _s);
      document.documentElement.setAttribute('data-mode',  _m);
    } catch(e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="logo">
        <i data-lucide="zap" style="width:20px;height:20px;color:var(--accent-light);flex-shrink:0"></i>
        <span>Command Centre</span>
      </div>

      <nav>
        <div class="nav-item active" data-view="dashboard">
          <span class="nav-icon" data-lucide="layout-dashboard"></span>
          Dashboard
        </div>
        <div class="nav-item" data-view="todos">
          <span class="nav-icon" data-lucide="check-square"></span>
          Todos
        </div>
        <div class="nav-item" data-view="goals">
          <span class="nav-icon" data-lucide="target"></span>
          Goals
        </div>
        <div class="nav-item" data-view="notes">
          <span class="nav-icon" data-lucide="file-text"></span>
          Notes
        </div>
        <div class="nav-item" data-view="stats">
          <span class="nav-icon" data-lucide="bar-chart-2"></span>
          Stats
        </div>
        <div class="nav-item" data-view="storage">
          <span class="nav-icon" data-lucide="hard-drive"></span>
          Storage
        </div>
      </nav>

      <div class="sidebar-bottom">
        <div class="style-selector">
          <div class="style-selector-header">
            <span class="style-selector-label">Theme</span>
            <button class="mode-toggle" id="mode-toggle-btn" title="Switch to light mode">
              <span data-lucide="sun" id="mode-toggle-icon"></span>
            </button>
          </div>
          <div class="style-options">
            <button class="style-btn active" data-style="ai" data-color="#a78bfa" title="AI — Cosmic Purple">
              <span class="style-swatch" style="background:#7c3aed"></span>AI
            </button>
            <button class="style-btn" data-style="finance" data-color="#22c55e" title="Finance — Fresh Green">
              <span class="style-swatch" style="background:#16a34a"></span>Finance
            </button>
            <button class="style-btn" data-style="content" data-color="#b0aba4" title="Content — Editorial">
              <span class="style-swatch" style="background:#888"></span>Content
            </button>
          </div>
        </div>
        <div class="sync-status">
          <span class="sync-dot"></span>
          <span id="sync-status-text">Not connected</span>
        </div>
        <div class="auth-section">
          <button id="auth-btn">Connect Drive</button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">
      <header id="header">
        <button class="btn-icon" id="hamburger-btn" style="display:none;margin-right:8px">
          <span data-lucide="menu"></span>
        </button>
        <h1 class="page-title">Dashboard</h1>
        <div class="header-actions">
          <div id="active-timer-widget" style="display:none;"></div>
          <button class="btn btn-secondary" id="sync-btn" style="display:none">
            <span data-lucide="refresh-cw"></span>
            Sync
          </button>
        </div>
      </header>

      <div id="view-container"></div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Modal -->
  <div id="modal-overlay">
    <div id="modal-content"></div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
