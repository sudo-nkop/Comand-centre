<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d1a" />
  <title>Command Centre</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="logo">
        <i data-lucide="zap" style="width:20px;height:20px;color:var(--accent-light);flex-shrink:0"></i>
        <span>Command Centre</span>
      </div>

      <nav>
        <div class="nav-item active" data-view="dashboard">
          <span class="nav-icon" data-lucide="layout-dashboard"></span>
          Dashboard
        </div>
        <div class="nav-item" data-view="todos">
          <span class="nav-icon" data-lucide="check-square"></span>
          Todos
        </div>
        <div class="nav-item" data-view="goals">
          <span class="nav-icon" data-lucide="target"></span>
          Goals
        </div>
        <div class="nav-item" data-view="notes">
          <span class="nav-icon" data-lucide="file-text"></span>
          Notes
        </div>
        <div class="nav-item" data-view="stats">
          <span class="nav-icon" data-lucide="bar-chart-2"></span>
          Stats
        </div>
        <div class="nav-item" data-view="storage">
          <span class="nav-icon" data-lucide="hard-drive"></span>
          Storage
        </div>
      </nav>

      <div class="sidebar-bottom">
        <div class="sync-status">
          <span class="sync-dot"></span>
          <span id="sync-status-text">Not connected</span>
        </div>
        <div class="auth-section">
          <button id="auth-btn">Connect Drive</button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">
      <header id="header">
        <button class="btn-icon" id="hamburger-btn" style="display:none;margin-right:8px">
          <span data-lucide="menu"></span>
        </button>
        <h1 class="page-title">Dashboard</h1>
        <div class="header-actions">
          <div id="active-timer-widget" style="display:none;"></div>
          <button class="btn btn-secondary" id="sync-btn" style="display:none">
            <span data-lucide="refresh-cw"></span>
            Sync
          </button>
        </div>
      </header>

      <div id="view-container"></div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Modal -->
  <div id="modal-overlay">
    <div id="modal-content"></div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script async defer src="https://accounts.google.com/gsi/client"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
